services:
  - type: web
    name: mastermind-online-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false # Set this in Render Dashboard -> Environment
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set this in Render Dashboard -> Environment
    healthCheckPath: /
